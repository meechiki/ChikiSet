<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChikiSet — Compact Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  --panel-bg: rgba(255, 255, 255, 0.85);
  --panel-solid: #ffffff;
  --panel-sub: rgba(241, 245, 249, 0.9);
  --border-color: rgba(255, 255, 255, 0.8);
  --border-line: rgba(226, 232, 240, 0.9);
  
  --text-main: #0f172a;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  
  --accent-primary: #6366f1;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
  --accent-orange: #ff5e3a;
  --accent-orange-grad: linear-gradient(135deg, #ff7e5f 0%, #ff5e3a 100%);
  --accent-subtle: rgba(99, 102, 241, 0.12);
  --accent-glow: rgba(99, 102, 241, 0.2);
  
  --good-green: #10b981;
  --good-bg: rgba(16, 185, 129, 0.12);
  
  --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 8px 20px -4px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 16px 28px -8px rgba(15, 23, 42, 0.1);
  
  --glass-blur: blur(16px);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-full: 999px;
  
  --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --panel-bg: rgba(30, 41, 59, 0.8);
  --panel-solid: #1e293b;
  --panel-sub: rgba(15, 23, 42, 0.7);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-line: rgba(51, 65, 85, 0.6);
  
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --text-light: #64748b;
  
  --accent-primary: #818cf8;
  --accent-subtle: rgba(129, 140, 248, 0.18);
  --shadow-md: 0 8px 25px -4px rgba(0, 0, 0, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100vh;
  overflow: hidden;
  background: var(--bg-gradient);
  color: var(--text-main);
  font-family: 'Kanit', sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* Compact Header Bar */
header {
  flex: none;
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--border-color);
  padding: 8px 16px;
  box-shadow: var(--shadow-sm);
  z-index: 50;
}

.h-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  max-width: 1400px;
  margin: 0 auto;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-badge {
  width: 34px;
  height: 34px;
  background: var(--accent-orange-grad);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 4px 10px rgba(255, 94, 58, 0.3);
}

h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1;
}

h1 span {
  background: var(--accent-orange-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--panel-sub);
  padding: 3px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-line);
}

.nav-tab {
  font-size: 13px;
  font-weight: 500;
  padding: 5px 14px;
  color: var(--text-muted);
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 5px;
}

.nav-tab.active {
  background: var(--panel-solid);
  color: var(--accent-primary);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

.search-wrap {
  position: relative;
  width: 220px;
}

.search {
  width: 100%;
  background: var(--panel-sub);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-full);
  padding: 6px 12px 6px 32px;
  color: var(--text-main);
  font-family: 'Kanit', sans-serif;
  font-size: 13px;
  outline: none;
  transition: var(--transition-fast);
}

.search:focus {
  background: var(--panel-solid);
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
  font-size: 13px;
  pointer-events: none;
}

.theme-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-line);
  background: var(--panel-sub);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
}

/* Compact Main Workspace */
.app-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  padding: 12px 16px;
  gap: 16px;
}

/* Left Sidebar: Compact Muscle Map & Category Pills */
.sidebar-anatomy {
  width: 260px;
  flex: none;
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 12px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-md);
  overflow-y: auto;
}

.anatomy-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.anatomy-head h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
}

.view-toggle {
  display: flex;
  background: var(--panel-sub);
  padding: 2px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-line);
}

.toggle-btn {
  font-family: 'Kanit', sans-serif;
  font-size: 11px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  cursor: pointer;
}

.toggle-btn.active {
  background: var(--panel-solid);
  color: var(--accent-primary);
  font-weight: 600;
}

.anatomy-svg-box {
  width: 100%;
  max-width: 180px;
  margin: 0 auto 10px;
}

.muscle-path {
  fill: var(--accent-subtle);
  stroke: var(--accent-primary);
  stroke-width: 1.5;
  cursor: pointer;
  transition: var(--transition-fast);
}

.muscle-path:hover {
  fill: rgba(255, 94, 58, 0.35);
  stroke: #ff5e3a;
}

.muscle-path.active {
  fill: rgba(255, 94, 58, 0.5);
  stroke: #ff5e3a;
  stroke-width: 2;
  filter: drop-shadow(0 0 6px rgba(255, 94, 58, 0.5));
}

/* Category Quick Selector List */
.cat-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.cat-item {
  font-size: 12.5px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: var(--transition-fast);
}

.cat-item:hover {
  background: var(--panel-sub);
  color: var(--text-main);
}

.cat-item.active {
  background: var(--accent-primary);
  color: #ffffff;
  font-weight: 600;
}

/* Right Stage: Zero-Scroll Grid of Exercises */
.stage-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 14px;
  box-shadow: var(--shadow-md);
}

.stage-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-line);
}

.stage-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-primary);
}

.stage-count {
  font-size: 12px;
  color: var(--text-muted);
}

.ex-grid-wrap {
  flex: 1;
  overflow-y: auto;
  padding-right: 4px;
}

.ex-grid-wrap::-webkit-scrollbar {
  width: 5px;
}
.ex-grid-wrap::-webkit-scrollbar-thumb {
  background: var(--border-line);
  border-radius: 10px;
}

.ex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 10px;
}

.compact-card {
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  transition: var(--transition-fast);
  box-shadow: var(--shadow-sm);
}

.compact-card:hover {
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-md);
}

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
  line-height: 1.2;
}

.card-eq {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.set-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-primary);
  background: var(--accent-subtle);
  padding: 3px 8px;
  border-radius: var(--radius-full);
}

/* Fast Set Inputs inside Compact Card */
.compact-sets {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.compact-set-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--panel-sub);
  padding: 4px 8px;
  border-radius: var(--radius-sm);
}

.compact-set-row .set-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  width: 18px;
}

.input-num-wrap {
  display: flex;
  align-items: center;
  flex: 1;
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  border-radius: 6px;
  overflow: hidden;
}

.step-btn {
  width: 22px;
  height: 24px;
  border: none;
  background: var(--panel-sub);
  color: var(--text-main);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}
.step-btn:hover { background: var(--border-line); }

.compact-input {
  width: 100%;
  border: none;
  background: transparent;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-main);
  outline: none;
  padding: 2px;
}

.compact-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.btn-fast {
  flex: 1;
  font-family: 'Kanit', sans-serif;
  font-size: 11.5px;
  font-weight: 500;
  padding: 5px 0;
  border-radius: 6px;
  border: 1px solid var(--border-line);
  background: var(--panel-sub);
  color: var(--text-main);
  cursor: pointer;
}
.btn-fast.accent {
  background: var(--accent-gradient);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
}

.btn-fast-del {
  border: none;
  background: none;
  color: var(--text-light);
  cursor: pointer;
  padding: 0 4px;
  font-size: 14px;
}
.btn-fast-del:hover { color: #ef4444; }

/* Rest Timer Floating Mini Widget */
.timer-widget {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 90;
  background: var(--panel-solid);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-lg);
}

.timer-digits {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-orange);
}

.timer-btn-mini {
  border: none;
  background: var(--accent-orange-grad);
  color: #fff;
  font-family: 'Kanit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  cursor: pointer;
}

/* Schedule View UI */
.sched-container {
  flex: 1;
  overflow-y: auto;
}

.empty {
  text-align: center;
  color: var(--text-muted);
  font-size: 13.5px;
  padding: 40px;
}

@media(max-width: 800px) {
  body { height: auto; overflow: auto; }
  .app-container { flex-direction: column; height: auto; }
  .sidebar-anatomy { width: 100%; max-height: 240px; }
  .ex-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="h-content">
    <div class="logo-group">
      <div class="logo-badge">CS</div>
      <h1>Chiki<span>Set</span></h1>
    </div>

    <div class="nav-tabs">
      <div class="nav-tab active" data-view="library">💪 คลังท่า</div>
      <div class="nav-tab" data-view="schedule">📅 ตารางของฉัน</div>

    <div style="display:flex; gap:8px; align-items:center;">
      <div class="search-wrap">

</header>

<div class="app-container">

      <svg id="svgBack" viewBox="0 0 200 360" width="100%" height="auto" style="display:none;">

    </div>

    <!-- Fast Vertical Category List -->
    <div class="cat-list" id="catList"></div>
  </div>

  <!-- Right Stage: Exercises & Fast Set Inputs -->
  <div class="stage-panel" id="view-library">
    <div class="stage-head">
      <div class="stage-title" id="stageTitle">💪 ทุกหมวดหมู่</div>
      <div class="stage-count" id="stageCount">0 ท่า</div>

    <div class="ex-grid-wrap">
      <div class="ex-grid" id="exGrid"></div>
    </div>
  </div>

  <!-- Schedule Stage View -->
  <div class="stage-panel view" id="view-schedule" style="display:none;">
    <div class="sched-container" id="schedContent"></div>
  </div>
</div>

<!-- Floating Fast Rest Timer Widget -->
<div class="timer-widget" id="timerWidget">
  <span>⏱ พัก:</span>
  <span class="timer-digits" id="timerDigits">01:30</span>
  <button class="timer-btn-mini" id="timerStartBtn">เริ่มพัก 90s</button>
</div>

<script>
/* ---------- Database ---------- */
const DB = {

"ปลายแขน (Forearms)": [["Wrist Curl","บาร์เบล"],["Reverse Wrist Curl","บาร์เบล"],["Farmer's Carry","ดัมเบล"]],
"แกนกลางลำตัว (Abs/Core)": [["Plank","น้ำหนักตัว"],["Crunch","น้ำหนักตัว"],["Hanging Leg Raise","บาร์โหน"],["Cable Crunch","เคเบิล"]],
"ต้นขาหน้า (Quads)": [["Back Squat","บาร์เบล"],["Front Squat","บาร์เบล"],["Leg Press","เครื่อง"],["Leg Extension","เครื่อง"],["Bulgarian Split Squat","ดัมเบล"]],
"ต้นขาหลัง (Hamstrings)": [["Romanian Deadlift","บาร์เบล"],["Lying Leg Curl","เครื่อง"],["Stiff-Leg Deadlift","บาร์เบล"]],
"สะโพก (Glutes)": [["Hip Thrust","บาร์เบล"],["Glute Bridge","น้ำหนักตัว"],["Cable Glute Kickback","เคเบิล"]],

"คาร์ดิโอ/พลัยโอ (Cardio & Plyo)": [["Treadmill Run","เครื่อง"],["Jump Rope","เชือก"],["Burpee","น้ำหนักตัว"]],
"โอลิมปิก/พลัง (Olympic & Power)": [["Clean and Jerk","บาร์เบล"],["Snatch","บาร์เบล"],["Kettlebell Swing","เคทเทิลเบล"]]
};

/* ---------- State Persistence ---------- */
let logs = JSON.parse(localStorage.getItem('workoutLogs') || '{}');
let activeCat = 'ALL';
let currentTheme = localStorage.getItem('chikisetTheme') || 'light';

document.documentElement.setAttribute('data-theme', currentTheme);
document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀️' : '🌙';

document.getElementById('themeToggle').addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('chikisetTheme', currentTheme);
  document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
});

function saveLogs() { localStorage.setItem('workoutLogs', JSON.stringify(logs)); }
function keyFor(cat, name) { return cat + '::' + name; }

/* ---------- Render Category Sidebar List ---------- */
const catListEl = document.getElementById('catList');
const cats = Object.keys(DB);

function renderCatList() {
  catListEl.innerHTML = '';
  const allItem = document.createElement('div');
  allItem.className = 'cat-item' + (activeCat === 'ALL' ? ' active' : '');
  allItem.innerHTML = '<span>⚡ ทั้งหมด</span>';
  allItem.addEventListener('click', () => selectCategory('ALL'));
  catListEl.appendChild(allItem);

  cats.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cat-item' + (activeCat === cat ? ' active' : '');
    item.innerHTML = `<span>${cat.split(' (')[0]}</span>`;
    item.addEventListener('click', () => selectCategory(cat));
    catListEl.appendChild(item);
  });
}

function selectCategory(cat) {
  activeCat = cat;
  renderCatList();
  document.querySelectorAll('.muscle-path').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === activeCat);
  });
  renderStage();
}

/* ---------- Render Exercises in Zero-Scroll Grid ---------- */
const exGrid = document.getElementById('exGrid');
document.getElementById('search').addEventListener('input', renderStage);

function renderStage() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  exGrid.innerHTML = '';
  let count = 0;

  cats.forEach(cat => {
    if (activeCat !== 'ALL' && activeCat !== cat) return;
    const list = DB[cat].filter(([name]) => !q || name.toLowerCase().includes(q));
    list.forEach(([name, eq]) => {
      count++;
      exGrid.appendChild(buildCompactCard(cat, name, eq));
    });
  });

  document.getElementById('stageTitle').textContent = activeCat === 'ALL' ? '💪 ทุกหมวดหมู่' : activeCat;
  document.getElementById('stageCount').textContent = count + ' ท่า';

  if (count === 0) {
    exGrid.innerHTML = '<div class="empty">ไม่พบท่าออกกำลังกาย</div>';
  }
}

function buildCompactCard(cat, name, eq) {
  const k = keyFor(cat, name);
  const sets = logs[k] || [];
  const card = document.createElement('div');
  card.className = 'compact-card';

  card.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-title">${name}</div>
        <div class="card-eq">${eq}</div>
      </div>
      <span class="set-badge">${sets.length} เซ็ต</span>
    </div>
    <div class="compact-sets"></div>
    <div class="compact-actions">
      <button class="btn-fast accent" data-act="add">+ เซ็ต</button>
      <button class="btn-fast" data-act="rest">⏱ 90s</button>
    </div>
  `;

  const setsWrap = card.querySelector('.compact-sets');

  function paintSets() {
    setsWrap.innerHTML = '';
    sets.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'compact-set-row';
      row.innerHTML = `
        <span class="set-num">${i + 1}</span>
        <div class="input-num-wrap">
          <button class="step-btn" data-step="-2.5">-</button>
          <input class="compact-input" type="number" step="0.5" placeholder="กก." value="${s.w ?? ''}">
          <button class="step-btn" data-step="+2.5">+</button>
        </div>
        <div class="input-num-wrap">
          <button class="step-btn" data-step="-1">-</button>
          <input class="compact-input" type="number" step="1" placeholder="ครั้ง" value="${s.r ?? ''}">
          <button class="step-btn" data-step="+1">+</button>
        </div>
        <button class="btn-fast-del">×</button>
      `;

      const inputs = row.querySelectorAll('input');
      const [wInp, rInp] = inputs;
      const delBtn = row.querySelector('.btn-fast-del');
      const stepBtns = row.querySelectorAll('.step-btn');

      wInp.addEventListener('input', e => { s.w = e.target.value; logs[k] = sets; saveLogs(); });
      rInp.addEventListener('input', e => { s.r = e.target.value; logs[k] = sets; saveLogs(); });

      stepBtns[0].addEventListener('click', () => { s.w = Math.max(0, (parseFloat(s.w) || 0) - 2.5); wInp.value = s.w; saveLogs(); });
      stepBtns[1].addEventListener('click', () => { s.w = (parseFloat(s.w) || 0) + 2.5; wInp.value = s.w; saveLogs(); });
      stepBtns[2].addEventListener('click', () => { s.r = Math.max(0, (parseInt(s.r) || 0) - 1); rInp.value = s.r; saveLogs(); });
      stepBtns[3].addEventListener('click', () => { s.r = (parseInt(s.r) || 0) + 1; rInp.value = s.r; saveLogs(); });

      delBtn.addEventListener('click', () => {
        sets.splice(i, 1); logs[k] = sets; saveLogs();
        card.querySelector('.set-badge').textContent = sets.length + ' เซ็ต';
        paintSets();
      });

      setsWrap.appendChild(row);
    });
  }

  paintSets();

  card.querySelector('[data-act="add"]').addEventListener('click', () => {
    const lastSet = sets[sets.length - 1] || { w: '20', r: '10' };
    sets.push({ w: lastSet.w, r: lastSet.r });
    logs[k] = sets;
    saveLogs();
    card.querySelector('.set-badge').textContent = sets.length + ' เซ็ต';
    paintSets();
  });

  card.querySelector('[data-act="rest"]').addEventListener('click', () => startFastTimer(90));

  return card;
}

/* ---------- Anatomy Front/Back & Click Selector ---------- */
const btnFront = document.getElementById('btnFront');
const btnBack = document.getElementById('btnBack');
const svgFront = document.getElementById('svgFront');
const svgBack = document.getElementById('svgBack');

btnFront.addEventListener('click', () => {
  btnFront.classList.add('active'); btnBack.classList.remove('active');
  svgFront.style.display = 'block'; svgBack.style.display = 'none';
});

btnBack.addEventListener('click', () => {
  btnBack.classList.add('active'); btnFront.classList.remove('active');
  svgFront.style.display = 'none'; svgBack.style.display = 'block';
});

document.querySelectorAll('.muscle-path').forEach(p => {
  p.addEventListener('click', () => selectCategory(p.dataset.cat));
});

/* ---------- Fast Rest Timer ---------- */
let timerSec = 90, timerRunning = false, timerHandle = null;
const timerDigits = document.getElementById('timerDigits');
const timerStartBtn = document.getElementById('timerStartBtn');

function startFastTimer(sec) {
  timerSec = sec;
  updateTimerUI();
  if (timerRunning) clearInterval(timerHandle);
  timerRunning = true;
  timerStartBtn.textContent = 'หยุด';
  timerHandle = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) {
      clearInterval(timerHandle);
      timerRunning = false;
      timerStartBtn.textContent = 'เริ่มใหม่';
      try {
        const ctx = new AudioContext();
        const o = ctx.createOscillator(); o.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }
    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
  const s = String(timerSec % 60).padStart(2, '0');
  timerDigits.textContent = `${m}:${s}`;
}

timerStartBtn.addEventListener('click', () => {
  if (timerRunning) {
    clearInterval(timerHandle); timerRunning = false; timerStartBtn.textContent = 'เริ่ม';
  } else {
    startFastTimer(90);
  }
});

/* Initial Setup */
renderCatList();
renderStage();
</script>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChikiSet — ตารางออกกำลังกาย & Set Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Soft Cloud Light Palette (Default) */
  --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  --panel-bg: rgba(255, 255, 255, 0.75);
  --panel-solid: #ffffff;
  --panel-sub: rgba(241, 245, 249, 0.8);
  --border-color: rgba(255, 255, 255, 0.8);
  --border-line: rgba(226, 232, 240, 0.8);
  
  --text-main: #0f172a;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  
  --accent-primary: #6366f1;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
  --accent-orange: #ff5e3a;
  --accent-orange-grad: linear-gradient(135deg, #ff7e5f 0%, #ff5e3a 100%);
  --accent-subtle: rgba(99, 102, 241, 0.1);
  --accent-glow: rgba(99, 102, 241, 0.25);
  
  --good-green: #10b981;
  --good-bg: rgba(16, 185, 129, 0.1);
  
  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 10px 25px -5px rgba(15, 23, 42, 0.06), 0 8px 10px -6px rgba(15, 23, 42, 0.04);
  --shadow-lg: 0 20px 30px -10px rgba(15, 23, 42, 0.12);
  
  --glass-blur: blur(16px);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 999px;
  
  --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --panel-bg: rgba(30, 41, 59, 0.7);
  --panel-solid: #1e293b;
  --panel-sub: rgba(15, 23, 42, 0.6);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-line: rgba(51, 65, 85, 0.6);
  
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --text-light: #64748b;
  
  --accent-primary: #818cf8;
  --accent-subtle: rgba(129, 140, 248, 0.15);
  --shadow-md: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  font-family: 'Kanit', 'Inter', sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 120px;
}

::selection {
  background: var(--accent-primary);
  color: #ffffff;
}

/* Glassmorphism Header */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--border-color);
  padding: 16px 24px 0;
  box-shadow: var(--shadow-sm);
  transition: var(--transition-smooth);
}

.h-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  max-width: 960px;
  margin: 0 auto;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-badge {
  width: 42px;
  height: 42px;
  background: var(--accent-orange-grad);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 20px;
  box-shadow: 0 6px 16px rgba(255, 94, 58, 0.3);
  transform: rotate(-3deg);
  transition: var(--transition-smooth);
}

.logo-group:hover .logo-badge {
  transform: rotate(0deg) scale(1.05);
}

h1 {
  font-family: 'Kanit', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--text-main);
}

h1 span {
  background: var(--accent-orange-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 400;
  margin-top: 2px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-wrap {
  position: relative;
}

.search {
  background: var(--panel-sub);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-full);
  padding: 9px 16px 9px 38px;
  color: var(--text-main);
  font-family: 'Kanit', sans-serif;
  font-size: 13.5px;
  width: 210px;
  outline: none;
  transition: var(--transition-smooth);
}

.search:focus {
  width: 240px;
  background: var(--panel-solid);
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
  font-size: 14px;
  pointer-events: none;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-line);
  background: var(--panel-sub);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: var(--transition-smooth);
}

.icon-btn:hover {
  background: var(--panel-solid);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

/* Main Navigation Tabs */
.nav-wrap {
  max-width: 960px;
  margin: 14px auto 0;
}

.main-tabs {
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border-line);
}

.main-tab {
  font-family: 'Kanit', sans-serif;
  font-weight: 500;
  font-size: 15px;
  padding: 10px 16px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition-smooth);
  display: flex;
  align-items: center;
  gap: 6px;
}

.main-tab:hover {
  color: var(--text-main);
}

.main-tab.active {
  color: var(--accent-primary);
  font-weight: 600;
  border-bottom-color: var(--accent-primary);
}

/* Category Filter Chips */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 12px 0 6px;
  scrollbar-width: none;
  max-width: 960px;
  margin: 0 auto;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex: none;
  font-size: 13px;
  font-weight: 500;
  background: var(--panel-bg);
  border: 1px solid var(--border-line);
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  white-space: nowrap;
  backdrop-filter: var(--glass-blur);
  transition: var(--transition-smooth);
}

.tab:hover {
  background: var(--panel-solid);
  color: var(--text-main);
  transform: translateY(-1px);
}

.tab.active {
  background: var(--accent-gradient);
  border-color: transparent;
  color: #ffffff;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--accent-glow);
}

/* Page Layout Wrapper */
.wrap {
  max-width: 960px;
  margin: 24px auto 0;
  padding: 0 20px;
}

.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Cards & Section Headers */
.cat-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent-primary);
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: 0.02em;
}

.cat-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border-line);
}

.cat-title:first-child { margin-top: 0; }

.ex-card {
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: var(--transition-smooth);
}

.ex-card:hover {
  box-shadow: var(--shadow-md);
  border-color: rgba(99, 102, 241, 0.3);
}

.ex-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  gap: 12px;
}

.ex-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-main);
}

.ex-eq {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
  font-weight: 400;
}

.ex-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: none;
}

.set-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-primary);
  background: var(--accent-subtle);
  padding: 4px 10px;
  border-radius: var(--radius-full);
}

.chevron {
  color: var(--text-light);
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 12px;
}

.ex-card.open .chevron {
  transform: rotate(180deg);
  color: var(--accent-primary);
}

.ex-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border-line);
  background: var(--panel-sub);
}

.ex-card.open .ex-body { display: block; animation: slideDown 0.25s ease; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.set-labels {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 36px;
  gap: 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-top: 14px;
  padding: 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 36px;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
  animation: fadeIn 0.2s ease;
}

.set-row .idx {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
}

.set-row input {
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  padding: 8px 12px;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  width: 100%;
  outline: none;
  transition: var(--transition-smooth);
}

.set-row input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}

.del-set {
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 18px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-smooth);
}

.del-set:hover {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.1);
}

.ex-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.btn-mini {
  font-family: 'Kanit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  border: 1px solid var(--border-line);
  background: var(--panel-solid);
  color: var(--text-main);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition-smooth);
}

.btn-mini:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
  border-color: var(--accent-primary);
}

.btn-mini.accent {
  background: var(--accent-gradient);
  border-color: transparent;
  color: #ffffff;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.btn-mini.accent:hover {
  box-shadow: 0 6px 16px var(--accent-glow);
}

.btn-mini.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}

.btn-mini.ghost:hover {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.08);
}

.empty {
  color: var(--text-muted);
  font-size: 14px;
  text-align: center;
  padding: 48px 20px;
  background: var(--panel-bg);
  border: 1px dashed var(--border-line);
  border-radius: var(--radius-lg);
}

/* Schedule & Day Cards */
.sched-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  gap: 12px;
  flex-wrap: wrap;
}

.new-day-form {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 480px;
}

.new-day-form input {
  flex: 1;
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  color: var(--text-main);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: var(--transition-smooth);
}

.new-day-form input:focus {
  background: var(--panel-solid);
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}

.day-card {
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: var(--transition-smooth);
}

.day-card:hover {
  box-shadow: var(--shadow-md);
}

.day-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  cursor: pointer;
  gap: 12px;
}

.day-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-main);
}

.day-sub {
  font-size: 12.5px;
  color: var(--text-muted);
  margin-top: 2px;
}

.day-del {
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 16px;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  transition: var(--transition-smooth);
}

.day-del:hover {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.1);
}

.day-body {
  display: none;
  padding: 0 22px 22px;
  border-top: 1px solid var(--border-line);
  background: var(--panel-sub);
}

.day-card.open .day-body { display: block; }

.date-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 18px 0;
  flex-wrap: wrap;
}

.date-row input[type="date"] {
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  padding: 7px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  outline: none;
}

.history-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 12px 0 6px;
}

.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  color: var(--text-muted);
  padding: 4px 10px;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: var(--transition-smooth);
}

.chip:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.chip.today { border-color: var(--good-green); color: var(--good-green); background: var(--good-bg); }
.chip.active { background: var(--accent-primary); border-color: var(--accent-primary); color: #ffffff; }

.streak-strip {
  display: flex;
  gap: 6px;
  margin-top: 18px;
}

.streak-day {
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  padding: 8px 0;
  border-radius: var(--radius-sm);
  background: var(--panel-solid);
  border: 1px solid var(--border-line);
  transition: var(--transition-smooth);
}

.streak-day.hit {
  background: var(--accent-subtle);
  border-color: var(--accent-primary);
  color: var(--accent-primary);
  font-weight: 700;
}

/* Modal Exercise Picker */
.picker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.picker-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

.picker-box {
  background: var(--panel-solid);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 480px;
  padding: 22px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}

.picker-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.picker-head h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-main);
}

.picker-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  border-radius: 8px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.picker-close:hover { background: var(--panel-sub); color: var(--text-main); }

.picker-search {
  width: 100%;
  background: var(--panel-sub);
  border: 1px solid var(--border-line);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  color: var(--text-main);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
}

.pick-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 6px;
  border-bottom: 1px solid var(--border-line);
  font-size: 14px;
}

.pick-item .p-cat {
  font-size: 11px;
  color: var(--text-muted);
}

.pick-add {
  background: var(--panel-sub);
  border: 1px solid var(--border-line);
  color: var(--text-main);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition-smooth);
}

.pick-add:hover {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  color: #ffffff;
}

/* Floating Rest Timer (Flixo FAB Widget) */
.timer-fab {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 60;
  background: var(--panel-solid);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 18px;
  width: 220px;
  box-shadow: var(--shadow-lg);
  backdrop-filter: var(--glass-blur);
  transition: var(--transition-smooth);
}

.timer-fab.collapsed {
  width: auto;
  padding: 12px 18px;
  border-radius: var(--radius-full);
  cursor: pointer;
}

.timer-fab.collapsed .timer-full { display: none; }

.timer-collapsed-label {
  display: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--accent-orange);
  align-items: center;
  gap: 8px;
}

.timer-fab.collapsed .timer-collapsed-label { display: flex; }

.timer-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.timer-label button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  border-radius: 4px;
  padding: 0 4px;
}

.dial-wrap {
  display: flex;
  justify-content: center;
  margin: 10px 0 12px;
  position: relative;
}

.dial-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-main);
}

.presets {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.preset-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--panel-sub);
  border: 1px solid var(--border-line);
  color: var(--text-muted);
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: var(--transition-smooth);
}

.preset-btn.active {
  background: var(--accent-subtle);
  border-color: var(--accent-primary);
  color: var(--accent-primary);
  font-weight: 600;
}

.timer-controls { display: flex; gap: 8px; }

.timer-controls button {
  flex: 1;
  font-family: 'Kanit', sans-serif;
  font-weight: 600;
  font-size: 13px;
  border-radius: var(--radius-sm);
  padding: 8px 0;
  cursor: pointer;
  border: 1px solid var(--border-line);
  background: var(--panel-sub);
  color: var(--text-main);
  transition: var(--transition-smooth);
}

.timer-controls .start {
  background: var(--accent-orange-grad);
  border-color: transparent;
  color: #ffffff;
  box-shadow: 0 4px 12px rgba(255, 94, 58, 0.3);
}

footer {
  max-width: 960px;
  margin: 40px auto 0;
  padding: 0 20px;
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.6;
  text-align: center;
}

@media(max-width: 640px) {
  header { padding: 14px 16px 0; }
  h1 { font-size: 22px; }
  .search { width: 100%; }
  .search:focus { width: 100%; }

}

</head>
<body>

<header>
  <div class="h-top">
    <div class="logo-group">
      <div class="logo-badge">CS</div>
      <div>
        <h1>Chiki<span>Set</span></h1>
        <p class="tagline">ตารางออกกำลังกาย & Rest Timer — บันทึกในเครื่องอัตโนมัติ</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search" id="search" placeholder="ค้นหาท่าออกกำลังกาย...">
      </div>
      <button class="icon-btn" id="themeToggle" title="สลับธีม สว่าง/มืด">🌙</button>
    </div>
  </div>

  <div class="nav-wrap">
    <div class="main-tabs">
      <div class="main-tab active" data-view="library"><span>💪</span> คลังท่าออกกำลังกาย</div>
      <div class="main-tab" data-view="schedule"><span>📅</span> ตารางของฉัน</div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
</header>

<div class="wrap">
  <div class="view active" id="view-library"></div>
  <div class="view" id="view-schedule"></div>
</div>

<footer>
  รายการท่าออกกำลังกายครอบคลุมท่าหลักในยิม (~140 ท่า, 12 หมวดหมู่) | บันทึกประวัติและตารางในเบราว์เซอร์อัตโนมัติ (localStorage)
</footer>

<!-- Floating Rest Timer Widget -->
<div class="timer-fab collapsed" id="timerFab">
  <div class="timer-collapsed-label" id="collapsedLabel">⏱ พัก · แตะเพื่อเปิด</div>
  <div class="timer-full">
    <div class="timer-label"><span>REST TIMER</span><button id="collapseBtn">–</button></div>
    <div class="dial-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border-line)" stroke-width="8"/>
        <circle id="dialProgress" cx="60" cy="60" r="52" fill="none" stroke="#ff5e3a" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
      </svg>
      <div class="dial-num" id="dialNum">90</div>
    </div>
    <div class="presets" id="presets"></div>
    <div class="timer-controls">
      <button id="startPause" class="start">เริ่ม</button>
      <button id="resetTimer">รีเซ็ต</button>
    </div>
  </div>
</div>

<!-- Exercise Picker Modal -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-box">
    <div class="picker-head">
      <h3>เพิ่มท่าเข้าวัน</h3>
      <button class="picker-close" id="pickerClose">×</button>
    </div>
    <input class="picker-search" id="pickerSearch" placeholder="ค้นหาท่าออกกำลังกาย...">
    <div id="pickerList"></div>
  </div>
</div>

<script>
/* ---------- exercise database ---------- */
const DB = {

],

  ["Incline Dumbbell Curl","ดัมเบล"],["EZ-Bar Curl","อีซี่บาร์"],["Spider Curl","อีซี่บาร์"],

],

  ["Dips (Tricep-focused)","น้ำหนักตัว"],["Cable Kickback","เคเบิล"],
  ["Diamond Push-Up","น้ำหนักตัว"],["Rope Pushdown","เคเบิล"],["JM Press","บาร์เบล"]
],
"ปลายแขน (Forearms)": [

],
"แกนกลางลำตัว (Abs/Core)": [
  ["Plank","น้ำหนักตัว"],["Crunch","น้ำหนักตัว"],["Sit-Up","น้ำหนักตัว"],
  ["Hanging Leg Raise","บาร์โหน"],["Cable Crunch","เคเบิล"],["Russian Twist","น้ำหนักตัว/ดัมเบล"],
  ["Ab Wheel Rollout","ล้อเอบ"],["Mountain Climber","น้ำหนักตัว"],["Leg Raise","น้ำหนักตัว"],
  ["Bicycle Crunch","น้ำหนักตัว"],["Side Plank","น้ำหนักตัว"],["Cable Woodchopper","เคเบิล"]
],
"ต้นขาหน้า (Quads)": [
  ["Back Squat","บาร์เบล"],["Front Squat","บาร์เบล"],["Leg Press","เครื่อง"],
  ["Leg Extension","เครื่อง"],["Bulgarian Split Squat","ดัมเบล"],["Walking Lunge","ดัมเบล"],
  ["Goblet Squat","ดัมเบล/เคทเทิลเบล"],["Hack Squat","เครื่อง"],["Step-Up","ดัมเบล"],
  ["Sissy Squat","น้ำหนักตัว"]
],
"ต้นขาหลัง (Hamstrings)": [
  ["Romanian Deadlift","บาร์เบล"],["Lying Leg Curl","เครื่อง"],["Good Morning","บาร์เบล"],
  ["Stiff-Leg Deadlift","บาร์เบล"],["Nordic Curl","น้ำหนักตัว"],["Glute-Ham Raise","เครื่อง"],
  ["Single-Leg RDL","ดัมเบล"]
],
"สะโพก (Glutes)": [
  ["Hip Thrust","บาร์เบล"],["Glute Bridge","บาร์เบล/น้ำหนักตัว"],["Cable Glute Kickback","เคเบิล"],
  ["Sumo Deadlift","บาร์เบล"],["Fire Hydrant","น้ำหนักตัว"],["Curtsy Lunge","ดัมเบล"]
],
"น่อง (Calves)": [
  ["Standing Calf Raise","เครื่อง/บาร์เบล"],["Seated Calf Raise","เครื่อง"],
  ["Donkey Calf Raise","เครื่อง"],["Leg Press Calf Raise","เครื่อง"]
],
"คาร์ดิโอ/พลัยโอ (Cardio & Plyo)": [
  ["Treadmill Run","เครื่อง"],["Rowing Machine","เครื่อง"],["Jump Rope","เชือกกระโดด"],
  ["Battle Ropes","เชือกหนัก"],["Box Jump","กล่องพลัยโอ"],["Burpee","น้ำหนักตัว"],
  ["Assault Bike","เครื่อง"],["Sled Push","สเลด"],["Stair Climber","เครื่อง"]
],
"โอลิมปิก/พลัง (Olympic & Power)": [
  ["Clean and Jerk","บาร์เบล"],["Snatch","บาร์เบล"],["Power Clean","บาร์เบล"],
  ["Hang Clean","บาร์เบล"],["Clean Pull","บาร์เบล"],["Kettlebell Swing","เคทเทิลเบล"],
  ["Medicine Ball Slam","เมดิซินบอล"]
]
};
const FLAT = [];
Object.entries(DB).forEach(([cat,list])=> list.forEach(([name,eq])=> FLAT.push({cat,name,eq})));

/* ---------- Theme Switcher ---------- */
const themeBtn = document.getElementById('themeToggle');
let currentTheme = localStorage.getItem('chikisetTheme') || 'light';
document.documentElement.setAttribute('data-theme', currentTheme);
themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

themeBtn.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('chikisetTheme', currentTheme);
  themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
});

/* ---------- persisted state ---------- */
let logs = {};       
let schedule = [];    
let sessions = {};    

function loadAll(){
  try{ logs = JSON.parse(localStorage.getItem('workoutLogs')||'{}'); }catch(e){ logs={}; }
  try{ schedule = JSON.parse(localStorage.getItem('workoutSchedule')||'[]'); }catch(e){ schedule=[]; }
  try{ sessions = JSON.parse(localStorage.getItem('workoutSessions')||'{}'); }catch(e){ sessions={}; }
}
function saveLogs(){ try{ localStorage.setItem('workoutLogs', JSON.stringify(logs)); }catch(e){} }
function saveSchedule(){ try{ localStorage.setItem('workoutSchedule', JSON.stringify(schedule)); }catch(e){} }
function saveSessions(){ try{ localStorage.setItem('workoutSessions', JSON.stringify(sessions)); }catch(e){} }
loadAll();

function keyFor(cat,name){ return cat+'::'+name; }
function todayStr(){
  const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ---------- main tab switching ---------- */
document.querySelectorAll('.main-tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.main-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const v = t.dataset.view;
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.getElementById('tabs').style.display = v==='library' ? 'flex' : 'none';
    document.querySelector('.search-wrap').style.display = v==='library' ? 'block' : 'none';
  });
});

/* ================= LIBRARY VIEW ================= */
const tabsEl = document.getElementById('tabs');
const libView = document.getElementById('view-library');
const cats = Object.keys(DB);
let activeCat = 'ALL';

const allTab = document.createElement('div');
allTab.className='tab active'; allTab.textContent='ทั้งหมด'; allTab.dataset.cat='ALL';
tabsEl.appendChild(allTab);
cats.forEach(c=>{
  const t = document.createElement('div');
  t.className='tab'; t.textContent = c.split(' (')[0]; t.dataset.cat=c;
  tabsEl.appendChild(t);
});
tabsEl.addEventListener('click', e=>{
  const t = e.target.closest('.tab'); if(!t) return;
  activeCat = t.dataset.cat;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  renderLibrary();
});
document.getElementById('search').addEventListener('input', renderLibrary);

function renderLibrary(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  libView.innerHTML = '';
  let any = false;
  cats.forEach(cat=>{
    if(activeCat!=='ALL' && activeCat!==cat) return;
    const exs = DB[cat].filter(([name])=> !q || name.toLowerCase().includes(q));
    if(exs.length===0) return;
    any = true;
    const h = document.createElement('div'); h.className='cat-title'; h.textContent = cat;
    libView.appendChild(h);
    exs.forEach(([name,eq])=> libView.appendChild(buildExCard(cat,name,eq)));
  });
  if(!any) libView.innerHTML = '<div class="empty">ไม่พบท่าออกกำลังกายที่คุณค้นหา ลองคำอื่นดูครับ</div>';
}

function buildExCard(cat,name,eq){
  const k = keyFor(cat,name);
  const sets = logs[k] || [];
  const card = document.createElement('div'); card.className='ex-card';
  card.innerHTML = `
    <div class="ex-head">
      <div><div class="ex-name">${name}</div><div class="ex-eq">${eq}</div></div>
      <div class="ex-meta"><span class="set-count">${sets.length} เซ็ต</span><span class="chevron">▾</span></div>
    </div>
    <div class="ex-body">
      <div class="set-labels"><span>#</span><span>น้ำหนัก (กก.)</span><span>จำนวนครั้ง</span><span></span></div>
      <div class="sets-holder"></div>
      <div class="ex-actions">
        <button class="btn-mini accent" data-act="add">+ เพิ่มเซ็ต</button>
        <button class="btn-mini" data-act="rest">⏱ พัก 90s</button>
      </div>
    </div>`;
  const setsHolder = card.querySelector('.sets-holder');
  function paint(){
    setsHolder.innerHTML='';
    sets.forEach((s,i)=>{
      const row = document.createElement('div'); row.className='set-row';
      row.innerHTML = `<span class="idx">${i+1}</span>
        <input type="number" step="0.5" placeholder="กก." value="${s.w??''}">
        <input type="number" step="1" placeholder="ครั้ง" value="${s.r??''}">
        <button class="del-set">×</button>`;
      const [,wInp,rInp,delBtn] = row.children;
      wInp.addEventListener('input', e=>{ s.w=e.target.value; logs[k]=sets; saveLogs(); });
      rInp.addEventListener('input', e=>{ s.r=e.target.value; logs[k]=sets; saveLogs(); });
      delBtn.addEventListener('click', ()=>{ sets.splice(i,1); logs[k]=sets; saveLogs();
        card.querySelector('.set-count').textContent=sets.length+' เซ็ต'; paint(); });
      setsHolder.appendChild(row);
    });
  }
  paint();
  card.querySelector('.ex-head').addEventListener('click', ()=> card.classList.toggle('open'));
  card.querySelector('[data-act="add"]').addEventListener('click', e=>{
    e.stopPropagation(); sets.push({w:'',r:''}); logs[k]=sets; saveLogs();
    card.querySelector('.set-count').textContent=sets.length+' เซ็ต'; paint();
  });
  card.querySelector('[data-act="rest"]').addEventListener('click', e=>{
    e.stopPropagation(); openTimer(); setPreset(90); resetTimerState(); startTimer();
  });
  return card;
}
renderLibrary();

/* ================= SCHEDULE VIEW ================= */
const schedView = document.getElementById('view-schedule');
let pickerTargetDay = null;

function renderSchedule(){
  schedView.innerHTML = '';
  const toolbar = document.createElement('div'); toolbar.className='sched-toolbar';
  toolbar.innerHTML = `
    <div class="new-day-form">
      <input id="newDayName" placeholder="สร้างชื่อวันฝึกใหม่ เช่น Day 1 - อก/ไตรเซ็ป">
      <button class="btn-mini accent" id="addDayBtn">+ สร้างวันใหม่</button>
    </div>`;
  schedView.appendChild(toolbar);
  document.getElementById('addDayBtn').addEventListener('click', ()=>{
    const inp = document.getElementById('newDayName');
    const name = inp.value.trim();
    if(!name) return;
    schedule.push({id: 'd'+Date.now(), name, exercises:[]});
    saveSchedule(); inp.value=''; renderSchedule();
  });

  if(schedule.length===0){
    const e = document.createElement('div'); e.className='empty';
    e.textContent = 'ยังไม่มีวันฝึก — เริ่มต้นสร้างวันฝึกวันแรกของคุณได้เลยข้างบนนี้!';
    schedView.appendChild(e); return;
  }

  schedule.forEach(day=> schedView.appendChild(buildDayCard(day)));
}

function buildDayCard(day){
  const card = document.createElement('div'); card.className='day-card';
  const sessCount = Object.keys(sessions[day.id]||{}).length;
  card.innerHTML = `
    <div class="day-head">
      <div>
        <div class="day-name">${day.name}</div>
        <div class="day-sub">${day.exercises.length} ท่า · ฝึกไปแล้ว ${sessCount} ครั้ง</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="day-del" title="ลบวันนี้">🗑</button>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="day-body"></div>`;
  card.querySelector('.day-head').addEventListener('click', e=>{
    if(e.target.closest('.day-del')) return;
    card.classList.toggle('open');
    if(card.classList.contains('open')) paintDayBody();
  });
  card.querySelector('.day-del').addEventListener('click', ()=>{
    schedule = schedule.filter(d=>d.id!==day.id);
    delete sessions[day.id];
    saveSchedule(); saveSessions(); renderSchedule();
  });

  let currentDate = todayStr();
  function paintDayBody(){
    const body = card.querySelector('.day-body');
    const daySessions = sessions[day.id] = sessions[day.id] || {};
    const pastDates = Object.keys(daySessions).sort().reverse();

    body.innerHTML = `
      <div class="date-row">
        <label style="font-size:13px;color:var(--text-muted);font-weight:500;">เลือกวันที่ฝึก:</label>
        <input type="date" id="dateInput-${day.id}" value="${currentDate}">
        <button class="btn-mini accent" data-act="addex">+ เพิ่มท่าในวันนี้</button>
      </div>
      ${pastDates.length? `<div class="history-chips" id="chips-${day.id}"></div>`:''}
      <div id="exlist-${day.id}"></div>
      <div class="streak-strip" id="streak-${day.id}"></div>
    `;

    const dateInput = body.querySelector(`#dateInput-${day.id}`);
    dateInput.addEventListener('change', e=>{ currentDate = e.target.value; paintExList(); paintChips(); });

    body.querySelector('[data-act="addex"]').addEventListener('click', ()=> openPicker(day));

    function paintChips(){
      const chipsWrap = body.querySelector(`#chips-${day.id}`);
      if(!chipsWrap) return;
      chipsWrap.innerHTML = '';
      pastDates.slice(0,10).forEach(dt=>{
        const c = document.createElement('span');
        c.className = 'chip'+(dt===todayStr()?' today':'')+(dt===currentDate?' active':'');
        c.textContent = dt;
        c.addEventListener('click', ()=>{ currentDate = dt; dateInput.value = dt; paintExList(); paintChips(); });
        chipsWrap.appendChild(c);
      });
    }
    paintChips();

    function paintExList(){
      const listEl = body.querySelector(`#exlist-${day.id}`);
      listEl.innerHTML = '';
      if(day.exercises.length===0){
        listEl.innerHTML = '<div class="empty">ยังไม่มีท่าในวันนี้ กด "+ เพิ่มท่าในวันนี้" ด้านบน</div>';
        renderStreak(); return;
      }
      const dateSets = daySessions[currentDate] = daySessions[currentDate] || {};
      day.exercises.forEach((ex,exi)=>{
        const k = keyFor(ex.cat, ex.name);
        const sets = dateSets[k] = dateSets[k] || [];
        const exCard = document.createElement('div'); exCard.className='ex-card';
        exCard.innerHTML = `
          <div class="ex-head">
            <div><div class="ex-name">${ex.name}</div><div class="ex-eq">${ex.eq}</div></div>
            <div class="ex-meta">
              <span class="set-count">${sets.length} เซ็ต</span>
              <button class="btn-mini ghost" data-act="rmex" title="เอาท่านี้ออกจากวัน">ลบท่า</button>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="ex-body">
            <div class="set-labels"><span>#</span><span>น้ำหนัก (กก.)</span><span>จำนวนครั้ง</span><span></span></div>
            <div class="sets-holder"></div>
            <div class="ex-actions">
              <button class="btn-mini accent" data-act="add">+ เพิ่มเซ็ต</button>
              <button class="btn-mini" data-act="rest">⏱ พัก 90s</button>
            </div>
          </div>`;
        const holder = exCard.querySelector('.sets-holder');
        function paintSets(){
          holder.innerHTML='';
          sets.forEach((s,i)=>{
            const row = document.createElement('div'); row.className='set-row';
            row.innerHTML = `<span class="idx">${i+1}</span>
              <input type="number" step="0.5" placeholder="กก." value="${s.w??''}">
              <input type="number" step="1" placeholder="ครั้ง" value="${s.r??''}">
              <button class="del-set">×</button>`;
            const [,wInp,rInp,delBtn] = row.children;
            wInp.addEventListener('input', e=>{ s.w=e.target.value; saveSessions(); });
            rInp.addEventListener('input', e=>{ s.r=e.target.value; saveSessions(); });
            delBtn.addEventListener('click', ()=>{ sets.splice(i,1); saveSessions();
              exCard.querySelector('.set-count').textContent=sets.length+' เซ็ต'; paintSets(); });
            holder.appendChild(row);
          });
        }
        paintSets();
        exCard.querySelector('.ex-head').addEventListener('click', e=>{
          if(e.target.closest('[data-act="rmex"]')) return;
          exCard.classList.toggle('open');
        });
        exCard.querySelector('[data-act="add"]').addEventListener('click', e=>{
          e.stopPropagation(); sets.push({w:'',r:''}); saveSessions();
          exCard.querySelector('.set-count').textContent=sets.length+' เซ็ต'; paintSets();
        });
        exCard.querySelector('[data-act="rest"]').addEventListener('click', e=>{
          e.stopPropagation(); openTimer(); setPreset(90); resetTimerState(); startTimer();
        });
        exCard.querySelector('[data-act="rmex"]').addEventListener('click', e=>{
          e.stopPropagation();
          day.exercises.splice(exi,1); saveSchedule();
          paintExList();
          card.querySelector('.day-sub').textContent = `${day.exercises.length} ท่า · ฝึกไปแล้ว ${Object.keys(daySessions).length} ครั้ง`;
        });
        listEl.appendChild(exCard);
      });
      renderStreak();
    }
    paintExList();

    function renderStreak(){
      const strip = body.querySelector(`#streak-${day.id}`);
      strip.innerHTML = '';
      for(let i=6;i>=0;i--){
        const d = new Date(); d.setDate(d.getDate()-i);
        const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const hit = !!daySessions[ds] && Object.values(daySessions[ds]).some(arr=>arr.length>0);
        const cell = document.createElement('div');
        cell.className = 'streak-day'+(hit?' hit':'');
        cell.textContent = ['อา','จ','อ','พ','พฤ','ศ','ส'][d.getDay()];
        strip.appendChild(cell);
      }
    }
  }
  return card;
}
renderSchedule();

/* ---------- exercise picker modal ---------- */
const pickerOverlay = document.getElementById('pickerOverlay');
const pickerSearch = document.getElementById('pickerSearch');
const pickerList = document.getElementById('pickerList');

function openPicker(day){
  pickerTargetDay = day;
  pickerOverlay.classList.add('open');
  pickerSearch.value=''; paintPicker();
  pickerSearch.focus();
}
document.getElementById('pickerClose').addEventListener('click', ()=> pickerOverlay.classList.remove('open'));
pickerOverlay.addEventListener('click', e=>{ if(e.target===pickerOverlay) pickerOverlay.classList.remove('open'); });
pickerSearch.addEventListener('input', paintPicker);

function paintPicker(){
  const q = pickerSearch.value.trim().toLowerCase();
  pickerList.innerHTML='';
  const already = new Set((pickerTargetDay?.exercises||[]).map(e=>keyFor(e.cat,e.name)));
  const results = FLAT.filter(e=> !q || e.name.toLowerCase().includes(q) || e.cat.toLowerCase().includes(q)).slice(0,60);
  if(results.length===0){ pickerList.innerHTML='<div class="empty">ไม่พบท่าออกกำลังกาย</div>'; return; }
  results.forEach(e=>{
    const k = keyFor(e.cat,e.name);
    const row = document.createElement('div'); row.className='pick-item';
    row.innerHTML = `<div><div style="font-weight:500;">${e.name}</div><div class="p-cat">${e.cat}</div></div>
      <button class="pick-add">${already.has(k)?'เพิ่มแล้ว':'+ เพิ่ม'}</button>`;
    const btn = row.querySelector('.pick-add');
    if(already.has(k)) btn.disabled = true;
    btn.addEventListener('click', ()=>{
      pickerTargetDay.exercises.push({cat:e.cat,name:e.name,eq:e.eq});
      saveSchedule();
      btn.textContent='เพิ่มแล้ว'; btn.disabled=true;
      renderSchedule();
      setTimeout(()=>{
        const cards = document.querySelectorAll('.day-card');
        cards.forEach(c=>{ if(c.querySelector('.day-name').textContent===pickerTargetDay.name) c.classList.add('open'); });
      },0);
    });
    pickerList.appendChild(row);
  });
}

/* ---------- rest timer ---------- */
const fab = document.getElementById('timerFab');
const dialNum = document.getElementById('dialNum');
const dialProgress = document.getElementById('dialProgress');
const presetsEl = document.getElementById('presets');
const startPauseBtn = document.getElementById('startPause');
const CIRC = 2*Math.PI*52;
dialProgress.setAttribute('stroke-dasharray', CIRC.toFixed(1));
const PRESETS = [30,60,90,120,180];
let duration=90, remaining=90, running=false, tickHandle=null;
PRESETS.forEach(p=>{
  const b=document.createElement('button'); b.className='preset-btn'+(p===90?' active':''); b.textContent=p+'s';
  b.addEventListener('click', ()=> setPreset(p)); presetsEl.appendChild(b);
});
function setPreset(p){ duration=p; remaining=p;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active', parseInt(b.textContent)===p));
  paintDial();
}
function paintDial(){
  dialNum.textContent = remaining;
  const frac = remaining/duration;
  dialProgress.setAttribute('stroke-dashoffset', (CIRC*(1-frac)).toFixed(1));
  dialProgress.setAttribute('stroke', remaining<=0 ? '#10b981' : '#ff5e3a');
}
paintDial();
function beep(){
  try{ const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
    o.frequency.value=880; g.gain.value=0.18; o.start(); o.stop(ctx.currentTime+0.25);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
}
function startTimer(){
  if(running) return; running=true; startPauseBtn.textContent='พัก';
  tickHandle=setInterval(()=>{
    remaining-=1;
    if(remaining<=0){ remaining=0; paintDial(); clearInterval(tickHandle); running=false;
      startPauseBtn.textContent='เริ่ม'; beep(); return; }
    paintDial();
  },1000);
}
function pauseTimer(){ running=false; clearInterval(tickHandle); startPauseBtn.textContent='เริ่ม'; }
function resetTimerState(){ clearInterval(tickHandle); running=false; remaining=duration; paintDial(); startPauseBtn.textContent='เริ่ม'; }
startPauseBtn.addEventListener('click', ()=> running?pauseTimer():startTimer());
document.getElementById('resetTimer').addEventListener('click', resetTimerState);
function openTimer(){ fab.classList.remove('collapsed'); }
document.getElementById('collapseBtn').addEventListener('click', ()=> fab.classList.add('collapsed'));
document.getElementById('collapsedLabel').addEventListener('click', openTimer);
</script>
